<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Bitterne Clean and Green</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet" />
</head>
<body>

<form class="fourm" action="https://formspree.io/f/xvzdkqng" method="POST">

    <h2>
      Please enter your information for booking a Car Wash Session
    </h2>
    <p>
      Please Note All Adresses Outside Bitterne Park Area WILL BE DISREGARDED
    </p>

    <p>
        <label>Name<br>
        <input class="text-input" type="text" name="name" required></label>
    </p>

    <p>
        <label>Email<br>
        <input class="text-input" type="email" name="email" required></label>
    </p>

    <p>
        <label>Address<br>
        <input class="text-input" type="text" name="address" autocomplete="street-address" required></label>
    </p>


    <p>
        <label>Date & Time<br>
        <input class="text-input" type="datetime-local" name="datetime" required></label>
    </p>

    <p>
        <label for="job">What job do you need done?
        <select class="text-input" name="job" id="job" required>
          <option value="">--Please choose an option--</option>
          <option value="exWashRinceDry">Exterior Wash Rince & Dry £10</option>
          <option value="exDeepClean">Exterior Deep Clean £13</option>
          <option value="inVaccum">Interior Vaccum £6</option>
          <option value="inDeepClean">Interior Deep Clean (Vaccum + Dashboard & Windows) £10</option>
          <option value="CarDeepClean">Whole Car Deep Clean £22</option>

        </label>
        
    </p>

    <input type="hidden" name="_redirect" value="thankyou.html">

    <p>
        <button class="headerbutton" type="submit">Send Message</button>
    </p>

</form>


</body>
</html>
